<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schema-Sync Engine | Cloud Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm">
        <h1 class="text-2xl font-bold text-blue-600">Schema-Sync <span class="text-gray-400 font-light">Engine</span></h1>
        <div id="user-status" class="hidden items-center space-x-4">
            <span id="display-username" class="text-sm font-medium text-gray-600 italic"></span>
            <button onclick="logout()" class="text-sm text-red-500 hover:underline">Logout</button>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto p-8">
        
        <div id="login-section" class="bg-white p-8 rounded-xl shadow-lg border max-w-md mx-auto mt-10">
            <h2 class="text-xl font-bold mb-6 text-center text-gray-700">Secure Partner Login</h2>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="w-full p-3 border rounded focus:ring-2 focus:ring-blue-400 outline-none">
                <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded focus:ring-2 focus:ring-blue-400 outline-none">
                <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition">Enter Pipeline</button>
            </div>
        </div>

        <div id="app-interface" class="hidden space-y-8">
            
            <div class="bg-white p-8 rounded-xl shadow-md border-t-4 border-blue-500">
                <h3 class="text-lg font-bold mb-4">1. Upload Raw Product Data</h3>
                <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-xl p-10 text-center hover:border-blue-400 transition cursor-pointer bg-gray-50">
                    <p class="text-gray-500">Drag & Drop CSV here or <span class="text-blue-500 font-bold underline">Browse</span></p>
                    <input type="file" id="file-input" class="hidden" accept=".csv">
                </div>
                <div id="file-info" class="mt-4 hidden text-sm font-medium text-blue-600 text-center"></div>
                <button id="process-btn" onclick="processFile()" class="mt-6 w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 disabled:bg-gray-300">Process & Preview Data</button>
            </div>

            <div id="preview-section" class="hidden bg-white rounded-xl shadow-md border overflow-hidden">
                <div class="bg-gray-100 p-4 border-b flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-gray-700">Pipeline Complete</h3>
                        <p class="text-xs text-gray-500">Showing first 20 rows of <span id="total-rows" class="font-bold"></span> total rows.</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs text-gray-400 uppercase tracking-widest font-bold">Full File Price</p>
                        <p id="quote-price" class="text-3xl font-black text-blue-600"></p>
                    </div>
                </div>
                <div class="overflow-x-auto p-4 max-h-80">
                    <table class="w-full text-xs text-left border-collapse">
                        <thead id="table-head" class="bg-gray-50 sticky top-0 border-b"></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
                <div class="p-6 bg-gray-50 border-t text-center">
                    <button id="checkout-btn" onclick="checkout()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 shadow-lg transition">Confirm 1-Click Payment</button>
                </div>
            </div>

            <div id="success-section" class="hidden bg-green-50 border border-green-200 p-6 rounded-xl text-center">
                <div class="text-3xl mb-2">✅</div>
                <h3 class="text-xl font-bold text-green-700">Payment Verified</h3>
                <p class="text-green-600 mb-6 italic">Your Shopify CSV is unlocked and vaulted in AWS.</p>
                <button onclick="downloadFile(currentJobId)" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-700">Download Shopify CSV</button>
            </div>

            <div class="bg-white p-8 rounded-xl shadow-md border">
                <h3 class="text-lg font-bold mb-4">Cloud Vault History</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left">
                        <thead class="text-gray-400 uppercase text-xs border-b">
                            <tr>
                                <th class="pb-3">Date</th>
                                <th class="pb-3">Job ID</th>
                                <th class="pb-3 text-center">Status</th>
                                <th class="pb-3 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="history-body" class="divide-y"></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        const API_BASE_URL = "https://schema-sync-engine.onrender.com";
        let currentJobId = null;

        // --- AUTHENTICATION (FORM DATA FIX) ---
        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            console.log("DEBUG: Attempting Form Data login for", user);

            // Using URLSearchParams acts as a standard web form, bypassing CORS preflight
            const formData = new URLSearchParams();
            formData.append("username", user);
            formData.append("password", pass);

            try {
                const res = await fetch(`${API_BASE_URL}/token`, {
                    method: 'POST',
                    body: formData // Notice no JSON headers are sent!
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('username', user);
                    console.log("DEBUG: Login Successful");
                    showApp();
                } else {
                    const err = await res.json();
                    console.error("DEBUG: Login Failed", err.detail);
                    alert("Login Failed: " + err.detail);
                }
            } catch (error) {
                console.error("DEBUG: Connection Error", error);
                alert("Cannot reach server. Check the F12 Console for exact error.");
            }
        }

        function logout() {
            localStorage.clear();
            window.location.reload();
        }

        function showApp() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('app-interface').classList.remove('hidden');
            document.getElementById('user-status').classList.remove('hidden');
            document.getElementById('display-username').innerText = localStorage.getItem('username');
            fetchHistory();
        }

        // --- PROCESSING ---
        async function processFile() {
            const fileInput = document.getElementById('file-input');
            if (!fileInput.files[0]) return alert("Please select a file.");

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const btn = document.getElementById('process-btn');
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE_URL}/quote`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: formData
                });

                const data = await res.json();
                currentJobId = data.job_id;

                document.getElementById('total-rows').innerText = data.rows;
                document.getElementById('quote-price').innerText = `$${data.price.toFixed(2)}`;
                
                const head = document.getElementById('table-head');
                const body = document.getElementById('table-body');
                head.innerHTML = `<tr>${data.headers.map(h => `<th class="p-2 border">${h}</th>`).join('')}</tr>`;
                body.innerHTML = data.preview.map(row => `<tr>${row.map(cell => `<td class="p-2 border text-gray-500 font-mono">${cell}</td>`).join('')}</tr>`).join('');

                document.getElementById('preview-section').classList.remove('hidden');
                btn.classList.add('hidden');
            } catch (error) {
                console.error("Processing error:", error);
                alert("Error processing file.");
                btn.disabled = false;
                btn.innerText = "Process & Preview Data";
            }
        }

        async function checkout() {
            const res = await fetch(`${API_BASE_URL}/checkout/${currentJobId}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });

            if (res.ok) {
                document.getElementById('preview-section').classList.add('hidden');
                document.getElementById('success-section').classList.remove('hidden');
                fetchHistory();
            } else {
                alert("Checkout failed.");
            }
        }

        // --- DOWNLOAD & HISTORY ---
        function downloadFile(jobId) {
            const token = localStorage.getItem('token');
            console.log("DEBUG: Redirecting to download for", jobId);
            window.location.href = `${API_BASE_URL}/download/${jobId}?token=${token}`;
        }

        async function fetchHistory() {
            try {
                const res = await fetch(`${API_BASE_URL}/my-history`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await res.json();
                const tbody = document.getElementById('history-body');
                tbody.innerHTML = data.history.map(job => `
                    <tr class="hover:bg-gray-50">
                        <td class="py-4 text-xs text-gray-400 font-mono">${job.created_at.split(' ')[0]}</td>
                        <td class="py-4 font-mono text-xs text-blue-500">${job.id.substring(0,8)}...</td>
                        <td class="py-4 text-center">
                            <span class="px-2 py-1 rounded text-[10px] font-bold ${job.paid ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                ${job.paid ? 'PAID' : 'PENDING'}
                            </span>
                        </td>
                        <td class="py-4 text-right">
                            ${job.paid ? `<button onclick="downloadFile('${job.id}')" class="text-blue-600 hover:underline font-bold">Re-Download</button>` : '-'}
                        </td>
                    </tr>
                `).join('');
            } catch (e) { console.error("History fetch error", e); }
        }

        // --- UI HELPERS ---
        const dz = document.getElementById('drop-zone');
        const fi = document.getElementById('file-input');
        dz.onclick = () => fi.click();
        fi.onchange = () => {
            document.getElementById('file-info').innerText = `Selected: ${fi.files[0].name}`;
            document.getElementById('file-info').classList.remove('hidden');
        };

        // AUTO-LOAD
        if (localStorage.getItem('token')) showApp();
    </script>
</body>
</html>
